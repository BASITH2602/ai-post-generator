<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI LinkedIn Post Generator</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      height: 100vh;
      overflow: hidden;

      background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #0ea5e9;
      filter: blur(120px);
      opacity: 0.4;
    }

    .blob2 {
      background: #22c55e;
      right: 0;
    }

    .app {
      width: 500px;
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      z-index: 1;
      max-height: 90vh;
      overflow-y: auto;
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #22c55e, #0ea5e9);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .output {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      flex: 1;
    }

    .history {
      margin-top: 15px;
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 10px;
    }

    .history p {
      font-size: 12px;
      cursor: pointer;
      padding: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    body.light {
      background: #f1f5f9;
      color: black;
    }

    body.light .app {
      background: rgba(0,0,0,0.05);
    }

    body.light .output {
      background: rgba(255,255,255,0.8);
    }
  </style>
</head>

<body>

<div class="blob"></div>
<div class="blob blob2"></div>

<div class="app">
  <h2>🚀 AI Post Generator</h2>

  <button onclick="toggleTheme()">🌗 Toggle Theme</button>

  <input type="text" id="topic" placeholder="Enter Topic">

  <select id="tone">
    <option>Professional</option>
    <option>Motivational</option>
    <option>Casual</option>
  </select>

  <button onclick="generate()">Generate</button>

  <div class="output" id="post"></div>

  <div class="actions">
    <button onclick="copyPost()">Copy</button>
    <button onclick="downloadPost()">Download</button>
  </div>

  <div class="history">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>
async function generate() {
  let topic = document.getElementById("topic").value;
  let tone = document.getElementById("tone").value;

  const output = document.getElementById("post");
  output.innerText = "Generating...";

  const response = await fetch("https://ai-post-generator-1zcy.onrender.com/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ topic, tone })
  });

  const data = await response.json();
  const text = data.result;

  saveToHistory(text);
  output.innerText = text;
}

function copyPost() {
  navigator.clipboard.writeText(document.getElementById("post").innerText);
}

function downloadPost() {
  const text = document.getElementById("post").innerText;
  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "post.txt";
  link.click();
}

function saveToHistory(post) {
  let history = JSON.parse(localStorage.getItem("posts")) || [];
  history.unshift(post);
  localStorage.setItem("posts", JSON.stringify(history));
  loadHistory();
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("posts")) || [];
  const div = document.getElementById("history");
  div.innerHTML = "";

  history.slice(0,5).forEach(p => {
    const el = document.createElement("p");
    el.textContent = p;
    el.onclick = () => document.getElementById("post").innerText = p;
    div.appendChild(el);
  });
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

window.onload = loadHistory;
</script>

</body>
</html>
